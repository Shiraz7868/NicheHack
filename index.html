<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <input type="text" id="folderLink" placeholder="Enter Google Drive Folder Link">
        <button onclick="generateClientLink()">Generate Client Link</button>
        <a id="clientLink" target="_blank">Client Link</a>
    </div>

    <script>
        function generateClientLink() {
            const folderLink = document.getElementById('folderLink').value;
            const folderId = folderLink.split('/').pop();
            const clientLink = `client.html?folderId=${folderId}`;
            document.getElementById('clientLink').href = clientLink;
            document.getElementById('clientLink').textContent = clientLink;
        }
    </script>
</body>
</html>
