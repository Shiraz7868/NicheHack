<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Capture</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        video, canvas {
            margin: 10px;
            width: 300px;
            height: 300px;
            border: 2px solid #ffffff;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1e1e1e;
            padding: 20px;
            border: 2px solid #ffffff;
            border-radius: 10px;
            z-index: 1000;
        }
        .popup h2 {
            margin: 0 0 10px 0;
        }
        .popup button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Photo Capture</h1>
        <video id="video" autoplay style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button id="startButton">Start Capture</button>
    </div>
    <div class="popup" id="welcomePopup">
        <h2>Welcome!</h2>
        <p>Click the button below to start capturing photos.</p>
        <button onclick="closePopup()">Start</button>
    </div>

                console.error('Error initializing client: ' + error);
            });
